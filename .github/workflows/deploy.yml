  #         supabase functions deploy ai-assistant   --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
  #         supabase functions deploy bot-ai-chat    --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
  #         supabase functions deploy bot-translate  --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
